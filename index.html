<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
            <div class="logo"></div>
    </header>

    <main>
        <section class="hero">
            <h1>Search your Pokemon!</h1>
            <div class="searchteam">
                <input type="text" id="userInput">
                <button class="button" id="button">Search</button>
            </div>
        </section>
        
        <section class="card-container">
            <article class="card">
                <section>
                    <img src="" alt="" class="image" id="card-image">

                </section>
                <h2 id="name"></h2>
                <p>Weight: </p><p id="weight"></p>
                <p>Height: </p><p id="height"></p>
                <p>Type: </p><p id="type"></p>
            </article>

        </section>
    </main>
    <footer>
        
    </footer>
</body>
</html>
